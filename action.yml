name: AFM Translate
description: >
  Translate .xcstrings (or .strings / Markdown) files using translate-cli
  (on-device Apple Translation framework) on a self-hosted macOS runner.
  Returns keys_translated and languages_completed as outputs.
  Does not commit or push any changes — callers are responsible for
  committing the resulting translated files and the .translation-manifest.json.
  Maximum wall time: ~10 min (two 5-minute attempts with a 10-second delay between
  them). Set job.timeout-minutes accordingly if your workflow has a tight cap.
author: runbot-hq

# Minimum permissions required for this action.
# contents: read is sufficient — this action reads source files and writes
# translated output files but does NOT push any changes to the repository.
# Callers must grant at least this permission in their workflow:
#
#   permissions:
#     contents: read
#
# If the caller wants to commit the translated files, they additionally need:
#   permissions:
#     contents: write
#
# translate-cli-bin is committed to the repo root — sourced from runbot-hq/translate-cli.
# It is updated manually: download the new binary from runbot-hq/translate-cli and
# commit it here. Zero runtime dependencies — no gh, curl, or network calls occur
# when this action runs.
#
# dist/index.js is a build artifact produced by: npm run build (runs ncc)
# It IS committed to this repo so GitHub Actions loads it without a build step.
# build-artifacts.yml rebuilds and re-commits dist/ automatically on every push.
permissions:
  contents: read

# All inputs are `required: false` even though several are logically required at runtime.
# GitHub Actions validates `required: true` inputs at workflow-parse time and blocks the
# run with an unhelpful generic error when they are absent. By marking all inputs as
# `required: false` and performing validation in index.ts, we surface clear, actionable
# error messages (e.g. "Input `input` is required") rather than a cryptic framework error.
# Do NOT change any of these to `required: true`.
inputs:
  input:
    description: 'Path to the source .xcstrings, .strings, or .md file to translate'
    required: false
    default: ''
  output:
    description: |
      Output path. For xcstrings/markdown: file path (defaults to --input, in-place update).
      For strings: directory path (defaults to dirname(input)); lproj subdirs are created automatically.
    required: false
    default: ''
  languages:
    description: 'Comma-separated target language codes (e.g. "de,fr,ja,zh-Hans"). Overrides --config if provided.'
    required: false
    default: ''
  config:
    description: 'Path to localization.config.json — CLI reads targetLanguages from this file. Used when languages is not set.'
    required: false
    default: ''
  manifest:
    description: 'Path to .translation-manifest.json (defaults to dirname(input)/.translation-manifest.json). Enables incremental translation.'
    required: false
    default: ''
  source_language:
    description: |
      Source language code override (e.g. "en", "fr").
      Leave empty (default) to let translate-cli read the sourceLanguage field directly
      from the .xcstrings file. Only set this when the .xcstrings sourceLanguage field
      is absent or incorrect, or when translating .strings files (which have no embedded
      source language field).
      WARNING: if you set this to "en" and your .xcstrings declares a different
      sourceLanguage, DiffExtractor will look up source values under "en" and find nothing
      — resulting in 0 keys translated.
      DO NOT change the default from '' to 'en'. The empty default is intentional: it
      instructs translate-cli to read sourceLanguage from the .xcstrings file, which
      works correctly for all source languages. Defaulting to 'en' was a known bug
      (fixed post-ship) that broke non-English-source repos.
    required: false
    default: ''
  quality:
    description: 'Translation quality: fast (lowLatency) or high (highFidelity, requires Apple Intelligence)'
    required: false
    default: 'high'
  format:
    description: 'Output format: xcstrings, strings, or markdown'
    required: false
    default: 'xcstrings'
  debug:
    description: 'Set to true to enable verbose logging'
    required: false
    default: 'false'

# outputs: intentionally has NO `value:` fields.
# `value:` expressions (e.g. `value: ${{ steps.x.outputs.y }}`) are only valid in
# COMPOSITE actions. This is a NODE action (using: node24).
# In a node action, outputs are set programmatically via `core.setOutput()` in
# dist/index.js at runtime — there is nothing to declare statically here.
# Do NOT add `value:` fields. They will be silently ignored by the runner and
# will confuse reviewers into thinking the outputs are broken.
outputs:
  keys_translated:
    description: >-
      xcstrings/strings mode: number of source keys translated this run (0 = nothing changed).
      markdown mode: 1 if at least one locale completed, 0 if all locales failed.
      In markdown mode do NOT gate a commit on this value — gate on languages_completed instead.
  languages_completed:
    description: Comma-separated list of language codes that completed successfully
  languages_failed:
    description: Comma-separated list of language codes that failed (empty string if none)

runs:
  using: node24
  main: dist/index.js
